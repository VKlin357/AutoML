eda_block: |
  You are a data profiler. Write a Python script that:
  1) Reads the dataset at {filename} (csv/parquet/json supported).
  2) Computes: n_rows, n_cols, for each column: name, dtype, n_unique.
  3) Computes total_missing_frac across all cells.
  4) Prints ONLY a JSON object matching this structure:
     {{
       "dataset": "...",
       "columns": [...],
       "missing": {{"total_missing_frac": ...}},
       "basic_stats": {{"n_rows": ..., "n_cols": ...}},
       "notes": [...]
     }}
  Output must be valid JSON and nothing else.

task_block: |
  Given EDA JSON below, infer the ML task and propose:
  - task_type: binary/multiclass/regression/timeseries
  - target column name (best guess)
  - metric string (e.g. roc_auc, f1, accuracy, rmse)
  - split: {{"type": random/stratified/time, "n_folds": 5}}
  Return ONLY valid JSON.
  EDA:
  {eda_json}
